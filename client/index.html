<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Busca imágenes de Google en tiempo real, con resultados estructurados vía SerpApi."
    />
    <meta name="color-scheme" content="light dark" />
    <title>PixelFind · Buscador de imágenes</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var dark = stored
            ? stored === 'dark'
            : matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
